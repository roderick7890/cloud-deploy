name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: "true"
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Add SPA fallback
        run: |
          cp dist/index.html dist/404.html
          mkdir -p dist/legacy
          cp dist/index.html dist/legacy/index.html

      - name: Publish dist to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages
          git worktree add /tmp/cloud-deploy-gh-pages origin/gh-pages
          rsync -a --checksum --exclude ".git" dist/ /tmp/cloud-deploy-gh-pages/
          touch /tmp/cloud-deploy-gh-pages/.nojekyll

          cd /tmp/cloud-deploy-gh-pages
          git checkout -B gh-pages
          git add -A
          git commit -m "Deploy ${GITHUB_SHA} to GitHub Pages" || exit 0
          git push origin gh-pages
